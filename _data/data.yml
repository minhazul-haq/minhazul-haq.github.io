career-profile:
    title: Summary
    summary: |
      I am a fifth-year PhD student in Computer Science at UT Arlington. My research interests are in 
      <b>Machine Learning</b>, <b>Deep Learning</b>, <b>Computer Vision</b>, and <b>Medical Image Analysis</b>. 
      I am doing my PhD under the supervision of <a href="http://ranger.uta.edu/~huang/" target="_blank">Dr. Junzhou Huang</a>.
      My research projects include Cell/Nuclei Segmentation, Detection, Classification, etc.
      
      I completed my Bachelor in Computer Science & Engineering from Bangladesh University of Engineering & Technology (BUET) in 2014.
      After that, I worked as a Software Engineer at <a href="https://www.therapservices.net/" target="_blank">Therap Services</a> 
      for two years.
      
